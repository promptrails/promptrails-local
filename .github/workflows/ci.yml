name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o promptrails-local .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test -v -race ./...

  integration-go:
    name: Integration Tests (Go SDK)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build emulator
        run: go build -o promptrails-local .

      - name: Start emulator
        run: |
          ./promptrails-local --log-level error &
          sleep 2
          curl -sf http://localhost:8080/health

      - name: Run Go SDK integration tests
        working-directory: tests/go
        run: go test -v -count=1 ./...

      - name: Stop emulator
        if: always()
        run: pkill promptrails-local || true

  integration-python:
    name: Integration Tests (Python SDK)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: astral-sh/setup-uv@v4

      - name: Build emulator
        run: go build -o promptrails-local .

      - name: Start emulator
        run: |
          ./promptrails-local --log-level error &
          sleep 2
          curl -sf http://localhost:8080/health

      - name: Run Python SDK integration tests
        working-directory: tests/python
        run: uv run pytest test_integration.py -v

      - name: Stop emulator
        if: always()
        run: pkill promptrails-local || true

  integration-js:
    name: Integration Tests (JS SDK)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build emulator
        run: go build -o promptrails-local .

      - name: Start emulator
        run: |
          ./promptrails-local --log-level error &
          sleep 2
          curl -sf http://localhost:8080/health

      - name: Install JS dependencies
        working-directory: tests/js
        run: npm install

      - name: Run JS SDK integration tests
        working-directory: tests/js
        run: npm test

      - name: Stop emulator
        if: always()
        run: pkill promptrails-local || true
